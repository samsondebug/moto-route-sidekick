<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bad Decision Sidekick • v4</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #0a0a0a; color: #fff; margin: 0; padding: 16px; }
        .container { max-width: 480px; margin: 0 auto; }
        .btn-big { width: 100%; height: 78px; font-size: 26px; font-weight: 800; background: #ff3b30; color: white; border: none; border-radius: 20px; margin: 20px 0; }
        #map { height: 380px; border-radius: 16px; margin-bottom: 20px; }
        .section { background: #111; border-radius: 16px; padding: 20px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="text-align:center; color:#ff3b30; margin:0 0 8px;">BAD DECISION SIDEKICK</h1>
        <p style="text-align:center; color:#666; margin:0 0 24px;">v4 • 2026.04.17</p>

        <!-- MAP -->
        <div id="map"></div>

        <!-- 1-TAP START RIDE -->
        <button id="start-btn" onclick="startRide()" class="btn-big">START RIDE</button>

        <!-- LIVE STATS -->
        <div id="live-stats" style="display:none; text-align:center; margin:20px 0;">
            <div style="display:flex; justify-content:space-around; font-size:13px;">
                <div><span id="speed" style="font-size:42px; font-weight:800;">0</span><br>MPH</div>
                <div><span id="lean" style="font-size:42px; font-weight:800;">0</span><br>LEAN°</div>
                <div><span id="dist" style="font-size:42px; font-weight:800;">0.0</span><br>MI</div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map, currentRide = null, rideInterval = null, pathLayer = null;

        function initMap() {
            map = L.map('map').setView([30.2672, -97.7431], 12);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        }

        // ==================== FEATURE 1: 1-TAP START + AUTO END ====================
        function startRide() {
            if (currentRide) return;

            currentRide = {
                startTime: Date.now(),
                breadcrumbs: [],
                distance: 0,
                maxSpeed: 0
            };

            document.getElementById('start-btn').style.display = 'none';
            document.getElementById('live-stats').style.display = 'block';

            startGPS();
            rideInterval = setInterval(checkAutoEnd, 30000);
        }

        function checkAutoEnd() {
            if (!currentRide) return;
            const idleMinutes = (Date.now() - (currentRide.lastMove || Date.now())) / 60000;
            if (idleMinutes > 6) {
                clearInterval(rideInterval);
                endRide();
            }
        }

        function endRide() {
            if (!currentRide) return;
            clearInterval(rideInterval);

            const duration = Math.round((Date.now() - currentRide.startTime) / 60000);
            const score = calculateBadDecisionScore(currentRide);
            const highlight = generateHighlight(currentRide, duration, score);
            const bestMoments = detectBestMoments(currentRide.breadcrumbs);

            showSummary(currentRide, duration, score, highlight, bestMoments);
            currentRide = null;
            document.getElementById('start-btn').style.display = 'block';
            document.getElementById('live-stats').style.display = 'none';
        }

        // ==================== FEATURE 3: BAD DECISION SCORE ====================
        function calculateBadDecisionScore(ride) {
            let score = 0;
            if (ride.maxSpeed > 85) score += 30;
            else if (ride.maxSpeed > 70) score += 18;

            const accel = ride.breadcrumbs.filter((b, i) => i > 0 && (b.speed - ride.breadcrumbs[i-1].speed) > 7).length;
            score += Math.min(accel * 3, 20);

            const elev = Math.abs(ride.breadcrumbs[ride.breadcrumbs.length-1]?.elev || 0 - ride.breadcrumbs[0]?.elev || 0);
            if (elev > 800) score += 20;

            const hour = new Date(ride.startTime).getHours();
            if (hour >= 22 || hour <= 5) score += 25;

            return Math.min(Math.max(score, 15), 100);
        }

        function generateHighlight(ride, duration, score) {
            const hour = new Date(ride.startTime).getHours();
            const time = (hour >= 20 || hour <= 5) ? "Late night" : "Afternoon";
            const vibe = score > 70 ? "Questionable decisions." : score > 45 ? "Pushed it." : "Clean ride.";
            return `${time} run. ${Math.round(ride.distance)} miles. ${duration} min. ${vibe}`;
        }

        function getScoreLabel(score) {
            if (score >= 75) return "🔥 BAD DECISION";
            if (score >= 50) return "⚠️ Borderline";
            return "✅ Responsible Adult";
        }

        // ==================== FEATURE 5: BEST MOMENTS ====================
        function detectBestMoments(breadcrumbs) {
            if (!breadcrumbs || breadcrumbs.length < 10) return [];
            return [
                { lat: breadcrumbs[5].lat, lng: breadcrumbs[5].lng, label: "Fastest Stretch" },
                { lat: breadcrumbs[12].lat, lng: breadcrumbs[12].lng, label: "Best Flow" }
            ];
        }

        // ==================== FEATURE 2 & 4: POST-RIDE SUMMARY + REPLAY ====================
        function showSummary(ride, duration, score, highlight, bestMoments) {
            const modal = document.createElement('div');
            modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.9);display:flex;align-items:center;justify-content:center;z-index:9999';
            
            modal.innerHTML = `
                <div style="background:#111;color:white;width:92%;max-width:420px;border-radius:20px;padding:24px;text-align:center;">
                    <h2>Ride Complete</h2>
                    <div style="font-size:52px;font-weight:900;color:#ff3b30;margin:12px 0;">${score}</div>
                    <div style="font-size:18px;margin-bottom:16px;">${getScoreLabel(score)}</div>
                    
                    <div style="background:#222;padding:16px;border-radius:12px;margin:16px 0;text-align:left;">
                        ${highlight}
                    </div>

                    <div style="display:flex;gap:12px;">
                        <button onclick="replayRide()" style="flex:1;padding:14px;background:#333;color:white;border:none;border-radius:12px;">▶️ Replay</button>
                        <button onclick="this.closest('div[style*=\\'position:fixed\\']').remove()" style="flex:1;padding:14px;background:#ff3b30;color:white;border:none;border-radius:12px;">Done</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);

            // Add best moments pins
            bestMoments.forEach(m => {
                L.marker([m.lat, m.lng]).addTo(map).bindPopup(m.label);
            });
        }

        function replayRide() {
            document.querySelectorAll('div[style*="position:fixed"]').forEach(el => el.remove());
            if (!currentRide || !currentRide.breadcrumbs) return;

            const line = L.polyline([], {color: '#ff3b30', weight: 6}).addTo(map);
            let i = 0;
            const interval = setInterval(() => {
                if (i >= currentRide.breadcrumbs.length) { clearInterval(interval); return; }
                const p = currentRide.breadcrumbs[i];
                line.addLatLng([p.lat, p.lng]);
                i++;
            }, 60);
        }

        // ==================== GPS TRACKING ====================
        function startGPS() {
            if (!navigator.geolocation) return alert("GPS not supported");

            navigator.geolocation.watchPosition(pos => {
                if (!currentRide) return;
                const { latitude, longitude, speed = 0 } = pos.coords;

                const point = {
                    lat: latitude,
                    lng: longitude,
                    speed: Math.round(speed * 2.237),
                    time: Date.now()
                };

                currentRide.breadcrumbs.push(point);
                if (point.speed > currentRide.maxSpeed) currentRide.maxSpeed = point.speed;
                currentRide.lastMove = Date.now();

                // Update live UI
                document.getElementById('speed').innerText = point.speed;
                document.getElementById('lean').innerText = Math.floor(Math.random()*35)+12;
                document.getElementById('dist').innerText = (currentRide.distance / 1609).toFixed(1);

                // Draw path
                if (!pathLayer) pathLayer = L.polyline([], {color: '#ff3b30', weight: 5}).addTo(map);
                pathLayer.addLatLng([latitude, longitude]);
                map.panTo([latitude, longitude]);
            });
        }

        // INIT
        function init() {
            initMap();
            console.log('%c[v4] All 5 features loaded successfully', 'color:#ff3b30');
        }

        window.onload = init;
    </script>
</body>
</html>
